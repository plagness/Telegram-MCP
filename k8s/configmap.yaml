apiVersion: v1
kind: ConfigMap
metadata:
  name: telegram-config
  namespace: ns-telegram
data:
  # Внутренние адреса (K8s DNS)
  DB_HOST: tgdb
  DB_PORT: "5432"
  TGAPI_URL: http://tgapi:8000
  TELEGRAM_API_BASE: http://tgapi:8000
  TELEGRAM_API_URL: http://tgapi:8000
  TGWEB_URL: https://tgweb:8000

  # Внешние сервисы (cross-namespace DNS)
  LLM_CORE_URL: http://llmcore.ns-llm.svc.cluster.local:8080
  ARENA_CORE_URL: http://arenacore.ns-arena.svc.cluster.local:8082
  PLANNER_CORE_URL: http://plannercore.ns-planner.svc.cluster.local:8085
  METRICS_API_URL: http://metricsapi-service.ns-metrics.svc.cluster.local:8083
  CHANNEL_MCP_URL: http://chmcp-service.ns-channel.svc.cluster.local:3333
  BCS_MCP_URL: http://bcsmcp.ns-bcs.svc.cluster.local:3333

  # Конфигурация приложения
  LOG_LEVEL: info
  TEMPLATE_AUTOSEED: "1"
  WEBUI_ENABLED: "true"
  # Публичный URL Mini App (домен + порт)
  WEBUI_PUBLIC_URL: https://tg.example.com:8443
  PUBLIC_URL: https://tg.example.com:8443
  NODE_TLS_REJECT_UNAUTHORIZED: "0"
  # Путь к реестру нод (монтируется как volume в tgweb)
  NODES_CONFIG_PATH: /app/config/nodes.json
