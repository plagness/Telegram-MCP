{% extends "base.html" %}

{% block title %}Плагин{% endblock %}

{% block bar_left %}<a class="bee-bar__back" href="/marketplace?initData={{ user.initData if user else '' }}">&#8249;</a>{% endblock %}

{% block head_libs %}
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
{% endblock %}

{% block head %}
<style>
.mpd-header { text-align: center; padding: 20px 16px 12px; }
.mpd-icon { font-size: 48px; margin-bottom: 8px; }
.mpd-name { font-size: 20px; font-weight: 700; line-height: 1.3; }
.mpd-meta { font-size: 13px; color: var(--tg-hint); margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
.mpd-verified { display: inline-flex; align-items: center; gap: 3px; color: #66BB6A; font-weight: 600; }
.mpd-author-link { color: var(--accent); cursor: pointer; text-decoration: none; }
.mpd-desc { font-size: 14px; color: var(--tg-text); padding: 0 16px 12px; line-height: 1.5; }

.mpd-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 16px 12px; }
.mpd-stat { text-align: center; padding: 12px 8px; border-radius: 12px; background: var(--tg-secondary-bg); }
.mpd-stat__val { font-size: 20px; font-weight: 700; }
.mpd-stat__label { font-size: 11px; color: var(--tg-hint); margin-top: 2px; }

.mpd-section { padding: 0 16px; margin-bottom: 16px; }
.mpd-section-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.mpd-section-icon { font-size: 16px; }

.mpd-chart { width: 100%; height: 180px; border-radius: 12px; background: var(--tg-secondary-bg); }

.mpd-ep { padding: 10px 12px; border-radius: 10px; background: var(--tg-secondary-bg); margin-bottom: 6px; }
.mpd-ep__top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.mpd-ep__name { font-size: 14px; font-weight: 600; }
.mpd-ep__method { font-size: 11px; color: var(--tg-hint); margin-top: 2px; }
.mpd-ep__desc { font-size: 12px; color: var(--tg-hint); margin-top: 4px; }

.mpd-listing { padding: 10px 12px; border-radius: 10px; background: var(--tg-secondary-bg); margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.mpd-listing__info { flex: 1; min-width: 0; }
.mpd-listing__name { font-size: 14px; font-weight: 600; }
.mpd-listing__right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.mpd-listing__price { font-size: 16px; font-weight: 700; color: var(--accent); }
.mpd-listing__btn { padding: 6px 14px; border: none; border-radius: 8px; background: var(--accent); color: #000; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: opacity .15s; }
.mpd-listing__btn:active { opacity: .7; }
.mpd-listing__btn:disabled { opacity: .4; cursor: default; }

.mpd-gh { padding: 12px; border-radius: 12px; background: var(--tg-secondary-bg); }
.mpd-gh-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.mpd-gh-item { font-size: 13px; }
.mpd-gh-item strong { display: block; font-size: 16px; }
.mpd-gh-link { display: inline-block; margin-top: 8px; color: var(--accent); font-size: 13px; font-weight: 600; text-decoration: none; }

.mpd-author-card { padding: 12px; border-radius: 12px; background: var(--tg-secondary-bg); display: flex; align-items: center; gap: 12px; cursor: pointer; }
.mpd-author-card__avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #000; }
.mpd-author-card__info { flex: 1; }
.mpd-author-card__name { font-size: 15px; font-weight: 600; }
.mpd-author-card__meta { font-size: 12px; color: var(--tg-hint); }

.mp-badge {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 600;
    background: rgba(128,128,128,0.15); color: var(--tg-hint);
}
.mp-badge--open { background: rgba(46,125,50,0.2); color: #66BB6A; }
.mp-badge--gated { background: rgba(245,127,23,0.2); color: #FFA726; }
.mp-badge--private { background: rgba(84,110,122,0.2); color: #90A4AE; }

.mpd-skel { padding: 16px; }
</style>
{% endblock %}

{% block content %}
<div id="mpd-loading" class="mpd-skel">
    <div class="bee-skel" style="height:48px;width:48px;border-radius:50%;margin:0 auto 12px"></div>
    <div class="bee-skel bee-skel--title" style="margin:0 auto 8px;width:60%"></div>
    <div class="bee-skel bee-skel--line" style="margin:0 auto;width:40%"></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px">
        <div class="bee-skel" style="height:60px;border-radius:12px"></div>
        <div class="bee-skel" style="height:60px;border-radius:12px"></div>
        <div class="bee-skel" style="height:60px;border-radius:12px"></div>
    </div>
</div>
<div id="mpd-content" style="display:none"></div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    'use strict';

    var tgApp = window.Telegram && window.Telegram.WebApp;
    var initData = tgApp ? tgApp.initData : '';
    var hdrs = { 'X-Init-Data': initData };
    var slug = '{{ plugin_slug }}';
    if (!initData || !slug) return;

    fetch('/marketplace/v2/plugin/' + encodeURIComponent(slug), { headers: hdrs })
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(data) {
        if (!data || data.error) {
            document.getElementById('mpd-loading').innerHTML = '<div class="bee-result"><div class="bee-result-icon">&#128533;</div><div class="bee-result-title">Плагин не найден</div></div>';
            return;
        }
        document.getElementById('mpd-loading').style.display = 'none';
        document.getElementById('mpd-content').style.display = '';
        renderPlugin(data);
    });

    function renderPlugin(data) {
        var p = data.plugin || {};
        var endpoints = data.endpoints || [];
        var listings = data.listings || [];
        var gh = data.github;
        var stats = data.stats || {};
        var container = document.getElementById('mpd-content');

        var verifiedHtml = p.verified ? '<span class="mpd-verified">&#10004; Verified</span>' : '';
        var authorHtml = p.author ? '<a class="mpd-author-link" onclick="goAuthor(' + p.author.tg_id + ')">@' + esc(p.author.username) + '</a>' : '';

        var html = '';

        // Header
        html += '<div class="mpd-header">' +
            '<div class="mpd-icon">' + (p.icon_emoji || '&#9889;') + '</div>' +
            '<div class="mpd-name">' + esc(p.name) + '</div>' +
            '<div class="mpd-meta">' +
                'v' + esc(p.version) + ' &middot; ' + verifiedHtml + ' &middot; ' + authorHtml +
                ' &middot; ' + esc(p.category || '') +
            '</div>' +
        '</div>';

        // Description
        if (p.description) {
            html += '<div class="mpd-desc">' + esc(p.description) + '</div>';
        }

        // Stats
        html += '<div class="mpd-stats">' +
            '<div class="mpd-stat"><div class="mpd-stat__val">' + (p.github_stars || 0) + '</div><div class="mpd-stat__label">Stars</div></div>' +
            '<div class="mpd-stat"><div class="mpd-stat__val">' + (p.total_installs || 0) + '</div><div class="mpd-stat__label">Installs</div></div>' +
            '<div class="mpd-stat"><div class="mpd-stat__val">' + fmtNum(stats.total_calls || 0) + '</div><div class="mpd-stat__label">Calls</div></div>' +
        '</div>';

        // Activity chart
        if (stats.calls_by_day && stats.calls_by_day.length) {
            html += '<div class="mpd-section">' +
                '<div class="mpd-section-title"><span class="mpd-section-icon">&#128200;</span> Активность (30 дней)</div>' +
                '<div class="mpd-chart" id="chart-activity"></div>' +
            '</div>';
        }

        // Endpoints
        if (endpoints.length) {
            html += '<div class="mpd-section">' +
                '<div class="mpd-section-title"><span class="mpd-section-icon">&#128268;</span> Эндпоинты (' + endpoints.length + ')</div>';
            endpoints.forEach(function(ep) {
                var tier = ep.access_tier || 'open';
                var tierLabel = tier === 'open' ? 'open' : tier === 'gated' ? 'gated' : 'private';
                html += '<div class="mpd-ep">' +
                    '<div class="mpd-ep__top">' +
                        '<div><div class="mpd-ep__name">' + esc(ep.name || ep.slug) + '</div>' +
                            '<div class="mpd-ep__method">' + esc(ep.proxy_method || 'POST') + ' &middot; ' + esc(ep.slug) + '</div></div>' +
                        '<span class="mp-badge mp-badge--' + tier + '">' + tierLabel + '</span>' +
                    '</div>' +
                    (ep.description ? '<div class="mpd-ep__desc">' + esc(ep.description) + '</div>' : '') +
                '</div>';
            });
            html += '</div>';
        }

        // Listings
        if (listings.length) {
            html += '<div class="mpd-section">' +
                '<div class="mpd-section-title"><span class="mpd-section-icon">&#128142;</span> Подписки</div>';
            listings.forEach(function(l) {
                html += '<div class="mpd-listing">' +
                    '<div class="mpd-listing__info"><div class="mpd-listing__name">' + esc(l.endpoint_name || l.endpoint_slug) + '</div>' +
                        '<div style="font-size:12px;color:var(--tg-hint)">' + esc(l.billing_type || 'subscription') +
                        (l.period_days ? ' &middot; ' + l.period_days + ' дн.' : '') + '</div></div>' +
                    '<div class="mpd-listing__right">' +
                        '<div class="mpd-listing__price">' + l.price_stars + '&#11088;</div>' +
                        '<button class="mpd-listing__btn" onclick="subscribe(' + l.id + ', this)">Купить</button>' +
                    '</div>' +
                '</div>';
            });
            html += '</div>';
        }

        // GitHub
        if (gh) {
            html += '<div class="mpd-section">' +
                '<div class="mpd-section-title"><span class="mpd-section-icon">&#128025;</span> GitHub</div>' +
                '<div class="mpd-gh">' +
                    '<div class="mpd-gh-grid">' +
                        '<div class="mpd-gh-item"><strong>' + (gh.stars || 0) + '</strong>Stars</div>' +
                        '<div class="mpd-gh-item"><strong>' + (gh.forks || 0) + '</strong>Forks</div>' +
                        '<div class="mpd-gh-item"><strong>' + esc(gh.language || '—') + '</strong>Language</div>' +
                        '<div class="mpd-gh-item"><strong>' + (gh.contributors || 0) + '</strong>Contributors</div>' +
                    '</div>' +
                    (gh.latest_release ? '<div style="font-size:13px;color:var(--tg-hint)">Latest: ' + esc(gh.latest_release) + ' (' + (gh.releases_count || 0) + ' releases)</div>' : '') +
                    (gh.commit_activity && gh.commit_activity.length ? '<div class="mpd-chart" id="chart-commits" style="height:100px;margin-top:8px"></div>' : '') +
                    (p.github_url ? '<a class="mpd-gh-link" href="' + esc(p.github_url) + '" target="_blank" rel="noopener">GitHub &#8599;</a>' : '') +
                '</div>' +
            '</div>';
        }

        // Author card
        if (p.author) {
            var a = p.author;
            html += '<div class="mpd-section">' +
                '<div class="mpd-section-title"><span class="mpd-section-icon">&#128100;</span> Автор</div>' +
                '<div class="mpd-author-card" onclick="goAuthor(' + a.tg_id + ')">' +
                    '<div class="mpd-author-card__avatar">' + (a.username ? a.username[0].toUpperCase() : '?') + '</div>' +
                    '<div class="mpd-author-card__info">' +
                        '<div class="mpd-author-card__name">@' + esc(a.username) + '</div>' +
                        '<div class="mpd-author-card__meta">' + a.plugin_count + ' плагинов' + (a.verified ? ' &middot; &#10004;' : '') + '</div>' +
                    '</div>' +
                '</div>' +
            '</div>';
        }

        container.innerHTML = html;

        // Charts
        if (stats.calls_by_day && stats.calls_by_day.length) {
            renderActivityChart(stats.calls_by_day);
        }
        if (gh && gh.commit_activity && gh.commit_activity.length) {
            renderCommitChart(gh.commit_activity);
        }
    }

    function renderActivityChart(days) {
        var el = document.getElementById('chart-activity');
        if (!el) return;
        var chart = echarts.init(el);
        var isDark = document.documentElement.classList.contains('dark') || (tgApp && tgApp.colorScheme === 'dark');
        chart.setOption({
            grid: { left: 40, right: 16, top: 16, bottom: 24 },
            xAxis: { type: 'category', data: days.map(function(d) { return d.date.slice(5); }), axisLabel: { fontSize: 10, color: '#888' }, axisLine: { lineStyle: { color: '#444' } } },
            yAxis: { type: 'value', axisLabel: { fontSize: 10, color: '#888' }, splitLine: { lineStyle: { color: isDark ? '#333' : '#eee' } } },
            series: [{ type: 'line', data: days.map(function(d) { return d.calls; }), smooth: true, areaStyle: { color: 'rgba(255,193,7,0.2)' }, lineStyle: { color: '#FFC107', width: 2 }, itemStyle: { color: '#FFC107' }, symbolSize: 4 }],
        });
    }

    function renderCommitChart(weeks) {
        var el = document.getElementById('chart-commits');
        if (!el) return;
        var chart = echarts.init(el);
        chart.setOption({
            grid: { left: 4, right: 4, top: 4, bottom: 4 },
            xAxis: { type: 'category', show: false },
            yAxis: { type: 'value', show: false },
            series: [{ type: 'bar', data: weeks, itemStyle: { color: '#66BB6A', borderRadius: 2 }, barWidth: '60%' }],
        });
    }

    window.goAuthor = function(tgId) {
        window.location.href = '/marketplace/author/' + tgId + '?initData=' + encodeURIComponent(initData);
    };

    window.subscribe = function(listingId, btn) {
        if (!tgApp || !tgApp.openInvoice) {
            if (window.showToast) window.showToast('Доступно только в Telegram', 'error');
            return;
        }
        btn.disabled = true;
        btn.textContent = '...';

        fetch('/marketplace/v2/subscribe/' + listingId, {
            method: 'POST',
            headers: hdrs,
        })
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(data) {
            if (!data || !data.invoice_url) {
                btn.disabled = false;
                btn.textContent = 'Купить';
                if (window.showToast) window.showToast('Ошибка создания платежа', 'error');
                return;
            }
            tgApp.openInvoice(data.invoice_url, function(status) {
                if (status === 'paid') {
                    btn.textContent = '✓';
                    btn.style.background = '#66BB6A';
                    if (window.showToast) window.showToast('Подписка оформлена!', 'success');
                    if (window.haptic) window.haptic('notification', 'success');
                } else {
                    btn.disabled = false;
                    btn.textContent = 'Купить';
                    if (status === 'failed') {
                        if (window.showToast) window.showToast('Платёж не прошёл', 'error');
                    }
                }
            });
        })
        .catch(function() {
            btn.disabled = false;
            btn.textContent = 'Купить';
            if (window.showToast) window.showToast('Ошибка сети', 'error');
        });
    };

    function fmtNum(n) {
        if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
        return n.toString();
    }

    function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
})();
</script>
{% endblock %}
