{% extends "base.html" %}

{% block title %}Автор{% endblock %}

{% block bar_left %}<a class="bee-bar__back" href="/marketplace?initData={{ user.initData if user else '' }}">&#8249;</a>{% endblock %}

{% block head %}
<style>
.mpa-header { text-align: center; padding: 20px 16px 16px; }
.mpa-avatar { width: 72px; height: 72px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; color: #000; margin: 0 auto 10px; }
.mpa-name { font-size: 20px; font-weight: 700; line-height: 1.3; }
.mpa-meta { font-size: 13px; color: var(--tg-hint); margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; }
.mpa-verified { display: inline-flex; align-items: center; gap: 3px; color: #66BB6A; font-weight: 600; }
.mpa-gh-link { display: inline-block; margin-top: 8px; color: var(--accent); font-size: 13px; font-weight: 600; text-decoration: none; }

.mpa-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 16px 16px; }
.mpa-stat { text-align: center; padding: 12px 8px; border-radius: 12px; background: var(--tg-secondary-bg); }
.mpa-stat__val { font-size: 20px; font-weight: 700; }
.mpa-stat__label { font-size: 11px; color: var(--tg-hint); margin-top: 2px; }

.mpa-section { padding: 0 16px; margin-bottom: 16px; }
.mpa-section-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.mpa-section-icon { font-size: 16px; }

.mpa-card { display: flex; align-items: flex-start; gap: 12px; padding: 12px; border-radius: 12px; background: var(--tg-secondary-bg); margin-bottom: 8px; cursor: pointer; transition: opacity .15s; }
.mpa-card:active { opacity: .7; }
.mpa-card__icon { font-size: 28px; flex-shrink: 0; width: 40px; text-align: center; }
.mpa-card__body { flex: 1; min-width: 0; }
.mpa-card__name { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.mpa-card__stars { font-size: 12px; color: var(--tg-hint); margin-left: auto; flex-shrink: 0; }
.mpa-card__desc { font-size: 13px; color: var(--tg-hint); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mpa-card__badges { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }

.mp-badge {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 600;
    background: rgba(128,128,128,0.15); color: var(--tg-hint);
}
.mp-badge--cat { background: rgba(255,193,7,0.15); color: #FFC107; }
.mp-badge--eps { background: rgba(100,181,246,0.15); color: #64B5F6; }
.mp-badge--paid { background: rgba(171,71,188,0.15); color: #CE93D8; }

.mpa-empty { text-align: center; padding: 40px 16px; color: var(--tg-hint); }
.mpa-skel { padding: 16px; }
</style>
{% endblock %}

{% block content %}
<div id="mpa-loading" class="mpa-skel">
    <div class="bee-skel" style="height:72px;width:72px;border-radius:50%;margin:0 auto 12px"></div>
    <div class="bee-skel bee-skel--title" style="margin:0 auto 8px;width:50%"></div>
    <div class="bee-skel bee-skel--line" style="margin:0 auto;width:35%"></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px">
        <div class="bee-skel" style="height:60px;border-radius:12px"></div>
        <div class="bee-skel" style="height:60px;border-radius:12px"></div>
        <div class="bee-skel" style="height:60px;border-radius:12px"></div>
    </div>
</div>
<div id="mpa-content" style="display:none"></div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    'use strict';

    var tgApp = window.Telegram && window.Telegram.WebApp;
    var initData = tgApp ? tgApp.initData : '';
    var hdrs = { 'X-Init-Data': initData };
    var tgId = '{{ author_tg_id }}';
    if (!initData || !tgId) return;

    fetch('/marketplace/v2/author/' + encodeURIComponent(tgId), { headers: hdrs })
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(data) {
        if (!data || data.error) {
            document.getElementById('mpa-loading').innerHTML = '<div class="bee-result"><div class="bee-result-icon">&#128533;</div><div class="bee-result-title">Автор не найден</div></div>';
            return;
        }
        document.getElementById('mpa-loading').style.display = 'none';
        document.getElementById('mpa-content').style.display = '';
        renderAuthor(data);
    });

    function renderAuthor(data) {
        var container = document.getElementById('mpa-content');
        var a = data;
        var plugins = a.plugins || [];

        var initial = a.username ? a.username[0].toUpperCase() : '?';
        var verifiedHtml = a.verified ? '<span class="mpa-verified">&#10004; Verified</span>' : '';

        var joinDate = '';
        if (a.joined_at) {
            var d = new Date(a.joined_at);
            var months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
            joinDate = months[d.getMonth()] + ' ' + d.getFullYear();
        }

        var html = '';

        // Header
        html += '<div class="mpa-header">' +
            '<div class="mpa-avatar">' + esc(initial) + '</div>' +
            '<div class="mpa-name">@' + esc(a.username) + '</div>' +
            '<div class="mpa-meta">' +
                verifiedHtml +
                (joinDate ? ' &middot; на платформе с ' + joinDate : '') +
            '</div>' +
            (a.github_url ? '<a class="mpa-gh-link" href="' + esc(a.github_url) + '" target="_blank" rel="noopener">GitHub &#8599;</a>' : '') +
        '</div>';

        // Stats
        html += '<div class="mpa-stats">' +
            '<div class="mpa-stat"><div class="mpa-stat__val">' + (a.plugin_count || 0) + '</div><div class="mpa-stat__label">Плагинов</div></div>' +
            '<div class="mpa-stat"><div class="mpa-stat__val">' + fmtNum(a.total_installs || 0) + '</div><div class="mpa-stat__label">Установок</div></div>' +
            '<div class="mpa-stat"><div class="mpa-stat__val">' + fmtNum(a.total_calls || 0) + '</div><div class="mpa-stat__label">Вызовов</div></div>' +
        '</div>';

        // Plugins
        html += '<div class="mpa-section">' +
            '<div class="mpa-section-title"><span class="mpa-section-icon">&#128268;</span> Плагины (' + plugins.length + ')</div>';

        if (plugins.length === 0) {
            html += '<div class="mpa-empty">Плагинов пока нет</div>';
        } else {
            plugins.forEach(function(p) {
                var badges = '';
                if (p.category) {
                    badges += '<span class="mp-badge mp-badge--cat">' + esc(p.category) + '</span>';
                }
                if (p.endpoint_count) {
                    badges += '<span class="mp-badge mp-badge--eps">' + p.endpoint_count + ' endpoints</span>';
                }
                if (p.has_paid && p.min_price) {
                    badges += '<span class="mp-badge mp-badge--paid">' + p.min_price + '&#11088;</span>';
                }

                html += '<div class="mpa-card" onclick="goPlugin(\'' + esc(p.slug) + '\')">' +
                    '<div class="mpa-card__icon">' + (p.icon_emoji || '&#9889;') + '</div>' +
                    '<div class="mpa-card__body">' +
                        '<div class="mpa-card__name">' + esc(p.name) +
                            '<span class="mpa-card__stars">&#11088; ' + (p.github_stars || 0) + '</span>' +
                        '</div>' +
                        (p.description ? '<div class="mpa-card__desc">' + esc(p.description) + '</div>' : '') +
                        (badges ? '<div class="mpa-card__badges">' + badges + '</div>' : '') +
                    '</div>' +
                '</div>';
            });
        }
        html += '</div>';

        container.innerHTML = html;
    }

    window.goPlugin = function(slug) {
        window.location.href = '/marketplace/' + encodeURIComponent(slug) + '?initData=' + encodeURIComponent(initData);
    };

    function fmtNum(n) {
        if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
        return n.toString();
    }

    function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
})();
</script>
{% endblock %}
