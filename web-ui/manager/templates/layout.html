<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Page Manager{% endblock %}</title>
    <style>
        /* ── Design Tokens (Bee-UI / OLED) ──────────────────────── */
        :root {
            --bg: #000000;
            --bg-card: rgba(255,255,255,0.04);
            --bg-card-hover: rgba(255,255,255,0.07);
            --bg-input: rgba(255,255,255,0.06);

            --accent: #FFC107;
            --accent-light: #FFD54F;
            --accent-dark: #FF8F00;
            --accent-glow: rgba(255,193,7,0.12);
            --accent-text: #1A1A1A;

            --success: #4ade80;
            --success-bg: rgba(74,222,128,0.12);
            --error: #f87171;
            --error-bg: rgba(248,113,113,0.12);
            --warn: #fbbf24;
            --warn-bg: rgba(251,191,36,0.12);
            --info: #38bdf8;
            --info-bg: rgba(56,189,248,0.12);

            --text: #e4e4e7;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;

            --border: rgba(255,255,255,0.06);
            --border-accent: rgba(255,193,7,0.25);

            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 18px;

            --glass-blur: 16px;
            --glass-saturate: 180%;
            --glass-shadow: 0 2px 16px rgba(0,0,0,0.25);

            --anim-duration: 0.3s;
            --anim-stagger: 0.05s;

            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* ── Reset ──────────────────────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        a { color: var(--accent); text-decoration: none; transition: color var(--anim-duration); }
        a:hover { color: var(--accent-light); }

        /* ── Nav (glass morphism) ───────────────────────────────── */
        .nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 4px;
            height: 52px;
        }
        .nav__brand {
            font-weight: 700;
            font-size: 15px;
            color: var(--accent);
            margin-right: 16px;
            letter-spacing: -0.3px;
        }
        .nav__link {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            transition: all var(--anim-duration);
        }
        .nav__link:hover {
            color: var(--text);
            background: var(--bg-card);
        }
        .nav__link--active {
            color: var(--accent);
            background: var(--accent-glow);
        }
        .nav__spacer { flex: 1; }

        /* ── Layout ─────────────────────────────────────────────── */
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

        .mgr-split {
            display: grid;
            grid-template-columns: 1fr 390px;
            gap: 24px;
            align-items: start;
        }
        .mgr-main { min-width: 0; }
        .mgr-panel {
            position: sticky;
            top: 76px;
            max-height: calc(100vh - 76px);
            overflow-y: auto;
        }

        @media (max-width: 1100px) {
            .mgr-split { grid-template-columns: 1fr; }
            .mgr-panel {
                position: fixed;
                top: 0; right: 0; bottom: 0;
                width: 400px;
                max-width: 100vw;
                z-index: 200;
                background: var(--bg);
                border-left: 1px solid var(--border);
                transform: translateX(100%);
                transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
                overflow-y: auto;
                padding: 16px;
            }
            .mgr-panel--open { transform: translateX(0); }
            .mgr-panel-overlay {
                position: fixed;
                inset: 0;
                z-index: 199;
                background: rgba(0,0,0,0.5);
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.35s;
            }
            .mgr-panel-overlay--visible { opacity: 1; pointer-events: auto; }
        }

        /* ── Stat Cards ─────────────────────────────────────────── */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px 18px;
            animation: slideUp var(--anim-duration) ease both;
        }
        .stat-card:nth-child(1) { animation-delay: 0s; }
        .stat-card:nth-child(2) { animation-delay: calc(var(--anim-stagger) * 1); }
        .stat-card:nth-child(3) { animation-delay: calc(var(--anim-stagger) * 2); }
        .stat-card:nth-child(4) { animation-delay: calc(var(--anim-stagger) * 3); }
        .stat-card:nth-child(5) { animation-delay: calc(var(--anim-stagger) * 4); }
        .stat-card__value {
            font-size: 26px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1.2;
        }
        .stat-card__label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }
        .stat-card__value--success { color: var(--success); }
        .stat-card__value--error { color: var(--error); }
        .stat-card__value--info { color: var(--info); }

        /* ── Tables ─────────────────────────────────────────────── */
        .table-wrap {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 14px; text-align: left; }
        th {
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
        }
        td {
            font-size: 13px;
            border-bottom: 1px solid var(--border);
        }
        tr:last-child td { border-bottom: none; }
        tbody tr {
            transition: background var(--anim-duration);
            cursor: default;
        }
        tbody tr:hover { background: var(--bg-card-hover); }
        tbody tr.row--clickable { cursor: pointer; }
        tbody tr.row--selected {
            background: var(--accent-glow);
            border-left: 3px solid var(--accent);
        }
        tbody tr.row--accessible { border-left: 3px solid var(--success); }
        tbody tr.row--blocked { opacity: 0.4; border-left: 3px solid var(--error); }

        /* ── Badges ─────────────────────────────────────────────── */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            line-height: 1.4;
            white-space: nowrap;
        }
        .badge--active { background: var(--success-bg); color: var(--success); border: 1px solid rgba(74,222,128,0.2); }
        .badge--inactive { background: var(--error-bg); color: var(--error); border: 1px solid rgba(248,113,113,0.2); }
        .badge--type { background: var(--accent-glow); color: var(--accent); border: 1px solid rgba(255,193,7,0.2); }
        .badge--info { background: var(--info-bg); color: var(--info); border: 1px solid rgba(56,189,248,0.2); }
        .badge--warn { background: var(--warn-bg); color: var(--warn); border: 1px solid rgba(251,191,36,0.2); }
        .badge--role { background: rgba(99,102,241,0.12); color: #818cf8; border: 1px solid rgba(99,102,241,0.2); }
        .badge--chat { background: rgba(14,165,233,0.12); color: #38bdf8; border: 1px solid rgba(14,165,233,0.2); }

        /* ── Cards ──────────────────────────────────────────────── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 18px;
            margin-bottom: 16px;
            animation: slideUp var(--anim-duration) ease both;
        }
        .card__title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }

        /* ── Grid ───────────────────────────────────────────────── */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }

        /* ── Phone Frame ────────────────────────────────────────── */
        .phone-frame-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .phone-toolbar {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: var(--radius-md) var(--radius-md) 0 0;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            max-width: 375px;
        }
        .phone-toolbar__slug {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            color: var(--accent);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .phone-toolbar__btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 8px;
            font-size: 12px;
            transition: all var(--anim-duration);
        }
        .phone-toolbar__btn:hover {
            color: var(--text);
            border-color: var(--accent);
            background: var(--accent-glow);
        }
        .phone-frame {
            width: 100%;
            max-width: 375px;
            height: calc(100vh - 280px);
            max-height: 667px;
            min-height: 400px;
            border: 3px solid rgba(255,255,255,0.08);
            border-top: none;
            border-radius: 0 0 36px 36px;
            overflow: hidden;
            position: relative;
            background: #111;
        }
        .phone-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #111;
        }
        .phone-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            font-size: 13px;
            text-align: center;
            padding: 24px;
        }

        /* ── Forms ──────────────────────────────────────────────── */
        .mgr-input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            color: var(--text);
            font-size: 13px;
            font-family: var(--font);
            outline: none;
            transition: border-color var(--anim-duration), box-shadow var(--anim-duration);
        }
        .mgr-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .mgr-input::placeholder { color: var(--text-muted); }

        .mgr-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            transition: all var(--anim-duration);
            border: none;
        }
        .mgr-btn:active { transform: scale(0.97); }
        .mgr-btn--primary {
            background: var(--accent);
            color: var(--accent-text);
        }
        .mgr-btn--primary:hover { background: var(--accent-light); }
        .mgr-btn--outline {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .mgr-btn--outline:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }
        .mgr-btn--sm { padding: 5px 10px; font-size: 12px; }

        /* ── Checkbox/Chip ──────────────────────────────────────── */
        .chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            transition: all var(--anim-duration);
            user-select: none;
        }
        .chip input[type="checkbox"] { display: none; }
        .chip--active, .chip:has(input:checked) {
            background: var(--accent-glow);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── Pre ────────────────────────────────────────────────── */
        pre, code {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        }
        pre {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px;
            font-size: 12px;
            overflow-x: auto;
            color: var(--text-secondary);
        }

        /* ── Details ────────────────────────────────────────────── */
        details {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
        }
        details summary {
            padding: 12px 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-secondary);
        }
        details summary:hover { color: var(--text); }
        details[open] summary { border-bottom: 1px solid var(--border); }
        details > :not(summary) { padding: 14px 16px; }

        /* ── Page info under preview ────────────────────────────── */
        .page-info {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 var(--radius-md) var(--radius-md);
            padding: 10px 12px;
            width: 100%;
            max-width: 375px;
        }
        .page-info__row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 3px 0;
        }
        .page-info__label { color: var(--text-muted); }
        .page-info__value { color: var(--text-secondary); }

        /* ── Animations ─────────────────────────────────────────── */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(24px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ── Utility ────────────────────────────────────────────── */
        .text-muted { color: var(--text-muted); }
        .text-sm { font-size: 12px; }
        .mt-16 { margin-top: 16px; }
        .mt-24 { margin-top: 24px; }
        .mb-16 { margin-bottom: 16px; }
        .mb-24 { margin-bottom: 24px; }
        .gap-8 { gap: 8px; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .mono { font-family: 'SF Mono', 'Fira Code', monospace; }
    </style>
</head>
<body>
    <nav class="nav">
        <span class="nav__brand">Page Manager</span>
        <a href="/" class="nav__link{% if active_nav == 'dashboard' %} nav__link--active{% endif %}">Dashboard</a>
        <a href="/access" class="nav__link{% if active_nav == 'access' %} nav__link--active{% endif %}">Access</a>
        <a href="/health" class="nav__link{% if active_nav == 'health' %} nav__link--active{% endif %}">Health</a>
        <a href="/types" class="nav__link{% if active_nav == 'types' %} nav__link--active{% endif %}">Types</a>
        <span class="nav__spacer"></span>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
